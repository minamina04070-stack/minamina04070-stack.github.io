<html lang="ja">

<style>
  :root{
    --night: #1b2438;
    --night-deep: #131a2b;
    --gold: #e8b95e;
    --gold-soft: #f0d193;
    --rose: #d98e8e;

      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 10% 65%, rgba(255,255,255,.4), transparent),
      radial-gradient(1.5px 1.5px at 55% 45%, rgba(255,255,255,.3), transparent),
      radial-gradient(1px 1px at 92% 85%, rgba(255,255,255,.4), transparent),

    background-attachment: fixed;
  }
  .wrap{
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }
  header{
    text-align:center;
    margin-bottom: 40px;
  }
  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--gold-soft);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  h1{
    font-family: 'Shippori Mincho', serif;
    font-weight: 700;
    font-size: 34px;
    line-height: 1.5;
    color: var(--paper);
    letter-spacing: 0.02em;
  }
  h1 span{
    color: var(--gold);
  }
  .sub{
    margin-top: 16px;
    font-size: 14px;
    color: var(--mist);
    line-height: 1.9;
  }

  /* form */
  .card{
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,185,94,0.25);

  }
  .field-row{
    display:flex;
    gap: 12px;
    margin-top: 8px;
  }
  label.small{
    display:block;
    font-size: 12px;
    color: var(--gold-soft);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  select, input[type=number]{
    width:100%;
    background: rgba(19,26,43,0.7);
    border: 1px solid rgba(232,185,94,0.35);
    color: var(--paper);

    border-radius: 10px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    appearance:none;
    text-align:center;
  }
  select:focus, input:focus{
    outline: 2px solid var(--gold);
    outline-offset: 1px;
  }
  .unit{
    font-size:12px;
    color:var(--mist);
    display:block;
    text-align:center;
    margin-top:4px;
  }

    border-radius: 999px;

    letter-spacing: 0.08em;

  }

  }

  }
  .square{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    max-width: 300px;
    margin: 0 auto;
  }

    aspect-ratio: 1;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);

  }
  .result-card li::before{
    content:"—";
    position:absolute;
    left:0;
    color: var(--sage);
  }

    display:flex;
    flex-wrap:wrap;
    gap: 8px;
  }
  .tag{

    border-radius: 999px;

    font-size: 11px;
    color: rgba(207,214,228,0.4);
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  @media (prefers-reduced-motion: reduce){
    .cell.active{ animation:none; }
  }
</style>
</head>

// 洛書 layout (magic square)
const LAYOUT = [
  [4,9,2],
  [3,5,7],
  [8,1,6]
];

// ---------- populate selects ----------
const yearSel = document.getElementById('year');
const monthSel = document.getElementById('month');
const daySel = document.getElementById('day');

const thisYear = new Date().getFullYear();
for(let y = thisYear; y >= 1920; y--){
  const opt = document.createElement('option');
  opt.value = y; opt.textContent = y;
  yearSel.appendChild(opt);
}
yearSel.value = 1990;

for(let m = 1; m <= 12; m++){
  const opt = document.createElement('option');
  opt.value = m; opt.textContent = m;
  monthSel.appendChild(opt);
}
function populateDays(){
  const y = parseInt(yearSel.value), m = parseInt(monthSel.value);
  const daysInMonth = new Date(y, m, 0).getDate();
  const prev = daySel.value;
  daySel.innerHTML = '';
  for(let d = 1; d <= daysInMonth; d++){
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    daySel.appendChild(opt);
  }
  if(prev && prev <= daysInMonth) daySel.value = prev;
}
yearSel.addEventListener('change', populateDays);
monthSel.addEventListener('change', populateDays);
populateDays();

// ---------- star calculation ----------
function digitRoot(n){
  n = Math.abs(n);
  while(n >= 10){
    n = String(n).split('').reduce((a,b)=>a+parseInt(b),0);
  }
  return n;
}

function calcStar(year, month, day){
  // 立春(だいたい2/4)より前は前年生まれとして扱う簡易版
  let effYear = year;
  if(month === 1 || (month === 2 && day < 4)){
    effYear = year - 1;
  }
  const dr = digitRoot(effYear);
  let star;
  if(effYear >= 2000){
    star = 10 - dr;
    if(star === 0) star = 9;
  } else {
    star = 11 - dr;
    if(star <= 0) star += 9;
    if(star > 9) star -= 9;
  }
  return star;
}

// ---------- grid rendering ----------
function renderSquare(activeStar){
  const sq = document.getElementById('square');
  sq.innerHTML = '';
  LAYOUT.forEach(row => {
    row.forEach(num => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (num === 5 ? ' center' : '');
      cell.textContent = num;
      if(num === activeStar) cell.classList.add('active');
      sq.appendChild(cell);
    });
  });
}

      <p>${s.caution}</p>
    </div>

    <div class="result-card">
      <h3>相性の良い仕事ジャンル</h3>
      <div class="tags">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>

    <div class="message">
      <p>${s.name}のあなたへ。\n${s.catch}\n今日という日も、あなたらしい一歩を。</p>
      <div class="signature">南無マオ</div>
    </div>

    <button class="retry" id="retryBtn">もう一度、占う</button>
  `;
  document.getElementById('retryBtn').addEventListener('click', reset);
}

function reset(){
  document.getElementById('formCard').style.display = 'block';
  document.getElementById('squareSection').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  window.scrollTo({top:0, behavior:'smooth'});
}

// ---------- flow ----------
document.getElementById('goBtn').addEventListener('click', () => {
  const y = parseInt(yearSel.value);
  const m = parseInt(monthSel.value);
  const d = parseInt(daySel.value);
  const err = document.getElementById('err');
  if(!y || !m || !d){
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';

  const star = calcStar(y, m, d);

  document.getElementById('formCard').style.display = 'none';
  const squareSection = document.getElementById('squareSection');
  squareSection.style.display = 'block';
  renderSquare(null);

  squareSection.scrollIntoView({behavior:'smooth', block:'start'});

  setTimeout(() => {
    renderSquare(star);
  }, 400);

  setTimeout(() => {
    renderResult(star);
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';
    resultEl.scrollIntoView({behavior:'smooth', block:'start'});
  }, 1600);
});
</script>
</body>
</html>
